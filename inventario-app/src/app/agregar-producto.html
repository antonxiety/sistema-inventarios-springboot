<div class="container">
    <div clas="container text-center" style="margin: 30px;">
        <h3> Agregar Producto</h3>   
    </div>

<form>
  <div class="mb-3">
    <label for="descripcion" class="form-label">Descripción del producto</label>
    <input 
    type="text" 
    class="form-control" 
    id="descripcion">
  />
  </div>

  <div class="mb-3"> 
  <label for="precio" class="form-label">Precio del producto</label>
  <input
  type="number"
  class="form-control"
  id="precio"
/>
</div>

<div class="mb-3"> 
  <label for="existencia" class="form-label">Existencia del producto</label>
  <input
  type="number"
  class="form-control"
  id="existencia"
/>

<div class="text-center">
  <button type="submit" class="btn btn-warning btn-sm me-3">Submit</button>
  <a href="/" class="btn btn-danger btn-sm">Volver</a>
</div>

  </form>
</div>
